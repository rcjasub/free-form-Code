# Secret — sensitive environment variables
# Values must be base64 encoded
# To encode: echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  DB_PASSWORD: cG9zdGdyZXM=   # "postgres" base64 encoded
  JWT_SECRET: Y2hhbmdlbWU=    # "changeme" base64 encoded — replace with a real secret
