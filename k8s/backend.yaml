# Deployment — runs 1 backend pod using the locally built image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: free-form-backend
          imagePullPolicy: Never   # use the locally built image, don't try to pull from Docker Hub
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: backend-config   # inject all values from configmap.yaml
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

---

# Service — exposes the backend internally so the frontend can reach it at "backend:4000"
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
